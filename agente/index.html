<body>
    <!-- Header Component -->
    <div id="header-placeholder"></div>

    <!-- Main Content -->
    <main class="cotizar-page" id="main-content">
        <div class="cotizar-container">

            <!-- Page Header -->
            <header class="cotizar-header">
                <h1 class="cotizar-header__title">Hablá con nuestro <span class="cotizar-header__highlight">Agente de IA</span></h1>
                <p class="cotizar-header__description">
                    Oni es nuestro Agente de IA de seguros. Responde unas preguntas y te mostraremos las mejores opciones para vos. Gratis, instantáneo y sin compromiso.
                </p>
            </header>

            <!-- Unified Chat Card -->
            <div class="chat-card">

                <!-- Chat Window -->
                <div class="chat-window" aria-live="polite" aria-label="Conversación con asesor virtual">
                    <div class="chat-messages" id="chat-messages" role="log" aria-live="polite">
                        <!-- Messages injected by JS -->
                    </div>

                    <!-- Typing indicator -->
                    <div class="chat-typing" id="chat-typing" aria-label="Oni está escribiendo..." hidden>
                        <div class="chat-bubble chat-bubble--agent">
                            <div class="typing-dots">
                                <span></span><span></span><span></span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Quick Suggestion Chips (shown before first user message) -->
                <div class="chat-suggestions" id="chat-suggestions" aria-label="Sugerencias">
                    <button class="suggestion-chip" data-message="Quiero cotizar un seguro de automotor">
                        🚗 Automotor
                    </button>
                    <button class="suggestion-chip" data-message="Quiero cotizar un seguro para mi moto">
                        🏍️ Motos
                    </button>
                    <button class="suggestion-chip" data-message="Necesito cotizar un seguro para mi hogar">
                        🏠 Hogar
                    </button>
                    <button class="suggestion-chip" data-message="Quiero cotizar ART para mi empresa">
                        👷 ART
                    </button>
                    <button class="suggestion-chip" data-message="Necesito un seguro agrícola o de granizo">
                        🌾 Agrícola
                    </button>
                    <button class="suggestion-chip" data-message="Necesito un seguro de accidentes personales">
                        🩺 Accidentes Personales
                    </button>
                    <button class="suggestion-chip" data-message="Necesito un seguro para mi comercio">
                        🏪 Comercio
                    </button>
                </div>

                <!-- Divider -->
                <div class="chat-divider"></div>

                <!-- Input Area -->
                <form class="chat-input-area" id="chat-form" autocomplete="off">
                    <div class="chat-input-wrapper">
                        <textarea
                            id="chat-input"
                            class="chat-input"
                            placeholder="Escribí tu mensaje..."
                            rows="1"
                            maxlength="1000"
                            aria-label="Escribir mensaje"
                            required
                        ></textarea>
                        <button type="submit" class="chat-send-btn" id="chat-send-btn" aria-label="Enviar mensaje">
                            <img src="../assets/icons/send.svg" alt="enviar" class="chat-send-icon">
                        </button>
                    </div>
                    <p class="chat-input-hint">Presioná <kbd>Enter</kbd> para enviar · <kbd>Shift</kbd>+<kbd>Enter</kbd> para nueva línea</p>
                </form>

            </div><!-- /.chat-card -->

        </div>
    </main>
