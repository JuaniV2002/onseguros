<style>
    /* ==========================================================================
       Accessibility & Screen Reader Utilities
       ========================================================================== */

    /* Skip link for keyboard navigation */
    .skip-link {
        position: absolute;
        top: -40px;
        left: 6px;
        background: var(--primary-600);
        color: var(--text-inverse);
        padding: var(--space-sm) var(--space-md);
        border-radius: var(--radius-md);
        font-weight: var(--font-weight-medium);
        z-index: 1000;
        transition: top var(--transition-fast);
    }

    .skip-link:focus {
        top: 6px;
    }

    /* ==========================================================================
       Header & Navigation
       ========================================================================== */

    .header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background-color: var(--bg-primary);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--border-light);
        z-index: 100;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        transition: background-color var(--transition-normal), border-color var(--transition-normal), box-shadow var(--transition-normal);
    }

    [data-theme="dark"] .header {
        background: hsl(240, 60%, 12%);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        border-bottom: 1px solid var(--border-medium);
    }

    .nav__container {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: var(--space-md) var(--space-lg);
        max-width: var(--container-xl);
        margin: 0 auto;
    }

    .nav__brand {
        display: flex;
        align-items: center;
    }

    .nav__logo {
        display: flex;
        align-items: center;
        gap: var(--space-sm);
        font-weight: var(--font-weight-bold);
        font-size: var(--font-size-xl);
        color: var(--primary-600);
        text-decoration: none;
    }

    .nav__logo:focus-visible {
        outline: 2px solid var(--primary-600);
        outline-offset: 2px;
        border-radius: var(--radius-sm);
    }

    .nav__logo-text {
        color: var(--text-primary);
    }

    .nav__toggle {
        display: none;
        flex-direction: column;
        gap: 4px;
        padding: var(--space-sm);
        background: none;
        border: none;
        cursor: pointer;
        min-width: 44px;
        min-height: 44px;
        justify-content: center;
        align-items: center;
    }

    .nav__toggle-line {
        width: 24px;
        height: 2px;
        background-color: var(--text-primary);
        transition: all var(--transition-fast);
    }

    .nav__toggle--active .nav__toggle-line:nth-child(1) {
        transform: translateY(6px) rotate(45deg);
    }

    .nav__toggle--active .nav__toggle-line:nth-child(2) {
        opacity: 0;
    }

    .nav__toggle--active .nav__toggle-line:nth-child(3) {
        transform: translateY(-6px) rotate(-45deg);
    }

    .nav__menu {
        display: flex;
        align-items: center;
        gap: var(--space-lg);
    }

    .nav__link {
        position: relative;
        font-weight: var(--font-weight-medium);
        color: var(--text-secondary);
        transition: color var(--transition-fast);
        padding: var(--space-sm) var(--space-md);
        border-radius: var(--radius-md);
        text-decoration: none;
        min-height: 44px;
        display: flex;
        align-items: center;
    }

    .nav__link:hover,
    .nav__link:focus {
        color: var(--primary-600);
    }

    .nav__link:focus-visible {
        outline: 2px solid var(--primary-600);
        outline-offset: 2px;
    }

    .nav__link--cta {
        background-color: var(--primary-600);
        color: #ffffff;
        border-radius: var(--radius-lg);
        padding: var(--space-sm) var(--space-lg);
    }

    .nav__link--cta:hover {
        background-color: var(--primary-700);
        color: #ffffff;
        transform: translateY(-1px);
    }

    /* Mobile Navigation */
    @media (max-width: 1023px) {
        .nav__toggle {
            display: flex;
        }

        .nav__menu {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background-color: var(--bg-tertiary);
            border-top: 1px solid var(--border-light);
            box-shadow: var(--shadow-lg);
            flex-direction: column;
            align-items: stretch;
            gap: 0;
            padding: var(--space-lg);
            transform: translateY(-100%);
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition-normal);
        }

        .nav__menu[aria-expanded="true"] {
            transform: translateY(0);
            opacity: 1;
            visibility: visible;
        }

        .nav__item {
            border-bottom: 1px solid var(--border-light);
        }

        .nav__item:last-child {
            border-bottom: none;
        }

        .nav__link {
            padding: var(--space-lg) 0;
            justify-content: center;
        }

        .nav__item--cta {
            margin-top: var(--space-md);
            text-align: center;
        }

        .nav__link--cta {
            display: inline-block;
            width: auto;
            padding: var(--space-md) var(--space-2xl);
        }
    }
</style>

<!-- Skip to main content link for accessibility -->
<a href="#main-content" class="skip-link">Saltar al contenido principal</a>

<!-- Header -->
<header class="header">
    <nav class="nav" aria-label="Navegación principal">
        <div class="nav__container">
            <div class="nav__brand">
                <a href="/" class="nav__logo" aria-label="On Seguros - Volver al inicio">
                    <img src="/assets/logo.svg" alt="On Seguros Río Cuarto" width="160" height="40" class="nav__logo-img">
                </a>
            </div>
            
            <button class="nav__toggle" 
                    aria-expanded="false" 
                    aria-controls="nav-menu" 
                    aria-label="Abrir menú de navegación">
                <span class="nav__toggle-line" aria-hidden="true"></span>
                <span class="nav__toggle-line" aria-hidden="true"></span>
                <span class="nav__toggle-line" aria-hidden="true"></span>
            </button>
            
            <ul class="nav__menu" id="nav-menu" role="menubar">
                <li class="nav__item" role="none">
                    <a href="/faq/faq.html" class="nav__link" role="menuitem">Preguntas frecuentes</a>
                </li>
                <li class="nav__item" role="none">
                    <a href="/#contacto" class="nav__link" role="menuitem">Contacto</a>
                </li>
                <li class="nav__item nav__item--cta" role="none">
                    <a href="/#cotizacion" class="nav__link nav__link--cta" role="menuitem">Cotizar</a>
                </li>
            </ul>
        </div>
    </nav>
</header>
