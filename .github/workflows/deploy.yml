name: Deploy to DreamHost

on:
  push:
    branches:
      - master

# Prevent multiple deployments running at once
concurrency:
  group: deploy-dreamhost
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need history to detect changed files

      - name: Install jq
        run: sudo apt-get install -y jq

      # Validate HTML files before deploying
      - name: Validate HTML
        run: |
          echo "✓ Checking HTML files exist..."
          if [ ! -f "index.html" ]; then
            echo "Error: index.html not found"
            exit 1
          fi
          echo "✓ HTML validation passed"

      # Check for common issues
      - name: Pre-deployment checks
        run: |
          echo "Running pre-deployment checks..."
          
          # Check for TODO or FIXME comments
          if grep -r "TODO\|FIXME" *.html *.js *.css 2>/dev/null; then
            echo "Warning: Found TODO/FIXME comments"
          fi
          
          # Verify critical files exist
          files=("index.html" "style.css" "script.js" "robots.txt" "sitemap.xml")
          for file in "${files[@]}"; do
            if [ -f "$file" ]; then
              echo "Found $file"
            else
              echo "Warning: $file not found"
            fi
          done

      - name: Set up SSH folder
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

      - name: Add SSH key
        run: |
          echo "${{ secrets.DH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Add SSH config
        run: |
          echo "${{ secrets.DH_HOST }}" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Add DreamHost to known_hosts
        run: |
          ssh-keyscan iad1-shared-e1-32.dreamhost.com >> ~/.ssh/known_hosts

      - name: Create config.json from secrets
        run: |
          echo "Creating config.json from GitHub secrets..."
          cat > config.json << 'EOF'
          {
            "SUPABASE_URL": "${{ secrets.SUPABASE_URL }}",
            "SUPABASE_ANON_KEY": "${{ secrets.SUPABASE_ANON_KEY }}",
            "API_BASE_URL": "${{ secrets.API_BASE_URL }}",
            "GET_POSTS_API_URL": "${{ secrets.GET_POSTS_API_URL }}",
            "GET_POST_API_URL": "${{ secrets.GET_POST_API_URL }}",
            "PUBLISH_API_URL": "${{ secrets.PUBLISH_API_URL }}",
            "UPDATE_API_URL": "${{ secrets.UPDATE_API_URL }}",
            "DELETE_API_URL": "${{ secrets.DELETE_API_URL }}",
            "BLOG_BASE_URL": "${{ secrets.BLOG_BASE_URL }}",
            "GET_FAQS_API_URL": "${{ secrets.GET_FAQS_API_URL }}",
            "GET_FAQ_API_URL": "${{ secrets.GET_FAQ_API_URL }}",
            "CREATE_FAQ_API_URL": "${{ secrets.CREATE_FAQ_API_URL }}",
            "UPDATE_FAQ_API_URL": "${{ secrets.UPDATE_FAQ_API_URL }}",
            "DELETE_FAQ_API_URL": "${{ secrets.DELETE_FAQ_API_URL }}",
            "GET_SUBSCRIBERS_API_URL": "${{ secrets.GET_SUBSCRIBERS_API_URL }}",
            "DELETE_SUBSCRIBER_API_URL": "${{ secrets.DELETE_SUBSCRIBER_API_URL }}"
          }
          EOF
          echo "config.json created successfully"

      - name: Deploy via rsync
        run: |
          echo "Starting deployment..."
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.gitignore' \
            --exclude '.DS_Store' \
            --exclude 'README.md' \
            --exclude '/admin/SETUP.md' \
            ./ \
            dh_fm2wbe@iad1-shared-e1-32.dreamhost.com:~/onseguros.net/
          echo "Deployment completed successfully!"

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Site URL**: https://www.onseguros.net" >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deployment failed! Check the logs above for details."
          exit 1