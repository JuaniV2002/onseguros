name: Deploy to DreamHost

on:
  push:
    branches:
      - master

# Prevent multiple deployments running at once
concurrency:
  group: deploy-dreamhost
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need history to detect changed files

      - name: Install jq
        run: sudo apt-get install -y jq

      # Validate HTML files before deploying
      - name: Validate HTML
        run: |
          echo "✓ Checking HTML files exist..."
          if [ ! -f "index.html" ]; then
            echo "❌ Error: index.html not found"
            exit 1
          fi
          echo "✓ HTML validation passed"

      # Check for common issues
      - name: Pre-deployment checks
        run: |
          echo "📋 Running pre-deployment checks..."
          
          # Check for TODO or FIXME comments
          if grep -r "TODO\|FIXME" *.html *.js *.css 2>/dev/null; then
            echo "⚠️  Warning: Found TODO/FIXME comments"
          fi
          
          # Verify critical files exist
          files=("index.html" "style.css" "script.js" "robots.txt" "sitemap.xml")
          for file in "${files[@]}"; do
            if [ -f "$file" ]; then
              echo "✓ Found $file"
            else
              echo "⚠️  Warning: $file not found"
            fi
          done

      - name: Set up SSH folder
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

      - name: Add SSH key
        run: |
          echo "${{ secrets.DH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Add SSH config
        run: |
          echo "${{ secrets.DH_HOST }}" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Add DreamHost to known_hosts
        run: |
          ssh-keyscan iad1-shared-e1-32.dreamhost.com >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          echo "🚀 Starting deployment..."
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.gitignore' \
            --exclude '.DS_Store' \
            --exclude 'README.md' \
            --exclude '/admin/SETUP.md' \
            ./ \
            dh_fm2wbe@iad1-shared-e1-32.dreamhost.com:~/onseguros.net/
          echo "✅ Deployment completed successfully!"

      # Check if posts.json changed and send newsletter
      - name: Check for new blog posts
        id: check-posts
        run: |
          echo "📝 Checking for new blog posts..."
          
          # Get the list of changed files in this push
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          
          if echo "$CHANGED_FILES" | grep -q "blog/data/posts.json"; then
            echo "✓ posts.json was modified"
            echo "posts_changed=true" >> $GITHUB_OUTPUT
            
            # Extract the newest post (first in the array after sorting by date)
            # Use -c flag to output compact JSON on a single line
            NEWEST_POST=$(cat blog/data/posts.json | jq -c '.posts | sort_by(.publishDate) | reverse | .[0]')
            echo "newest_post=$NEWEST_POST" >> $GITHUB_OUTPUT
            echo "📰 Newest post: $(echo $NEWEST_POST | jq -r '.title')"
          else
            echo "ℹ️  posts.json was not modified"
            echo "posts_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Send newsletter notification
        if: steps.check-posts.outputs.posts_changed == 'true'
        run: |
          echo "📧 Sending newsletter notification..."
          
          NEWEST_POST='${{ steps.check-posts.outputs.newest_post }}'
          
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://onseguros-newsletter.netlify.app/api/send-newsletter" \
            -H "Content-Type: application/json" \
            -d "{
              \"secret\": \"${{ secrets.NEWSLETTER_WEBHOOK_SECRET }}\",
              \"post\": $NEWEST_POST
            }")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "Response: $BODY"
          echo "HTTP Code: $HTTP_CODE"
          
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Newsletter sent successfully!"
            echo "- **Newsletter**: ✅ Sent to subscribers" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Newsletter sending failed (non-critical)"
            echo "- **Newsletter**: ⚠️ Failed to send" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Deployment Summary
        if: always()
        run: |
          echo "## 📦 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Site URL**: https://www.onseguros.net" >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed! Check the logs above for details."
          exit 1