name: Update Sitemap

# Trigger when posts.json is modified
on:
  push:
    branches:
      - main
      - master
    paths:
      - 'blog/data/posts.json'
  
  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  update-sitemap:
    name: Generate and Update Sitemap
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          # Fetch full history for accurate commits
          fetch-depth: 0
          # Use PAT or default token with write permissions
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package.json
      
      - name: 📦 Install Dependencies (if needed)
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
      
      - name: 🗺️ Generate Sitemap
        run: node scripts/generate-sitemap.js
      
      - name: 📊 Check for Changes
        id: git-check
        run: |
          git diff --exit-code sitemap.xml || echo "changed=true" >> $GITHUB_OUTPUT
      
      - name: 💾 Commit and Push Sitemap
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add sitemap.xml
          git commit -m "🗺️ Auto-update sitemap.xml - $(date +'%Y-%m-%d %H:%M')" -m "Triggered by changes to blog/data/posts.json" -m "[skip ci]"
          git push
      
      - name: ✅ Success Notification
        if: steps.git-check.outputs.changed == 'true'
        run: |
          echo "::notice::Sitemap successfully updated and committed!"
          echo "📝 Sitemap now includes $(grep -c '<url>' sitemap.xml) URLs"
      
      - name: ℹ️ No Changes
        if: steps.git-check.outputs.changed != 'true'
        run: |
          echo "::notice::Sitemap is already up to date. No changes needed."
